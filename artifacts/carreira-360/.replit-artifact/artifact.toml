kind = "web"
previewPath = "/"
title = "Carreira 360°"
version = "1.0.0"
id = "artifacts/carreira-360"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23516

[services.development]
run = "pnpm --filter @workspace/carreira-360 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/carreira-360", "run", "build" ]
publicDir = "artifacts/carreira-360/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23516"
BASE_PATH = "/"
